services:
  - type: web
    name: smart-home-iot-backend
    runtime: python
    region: singapore          # change to your nearest region
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.main:app --host 0.0.0.0 --port $PORT --workers 1
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: MONGODB_URL
        sync: false            # set manually in Render dashboard
      - key: MONGODB_DB_NAME
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      - key: JWT_ALGORITHM
        sync: false
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        sync: false
      - key: ADAFRUIT_IO_USERNAME
        sync: false
      - key: ADAFRUIT_IO_KEY
        sync: false
      - key: ADAFRUIT_MQTT_BROKER
        sync: false
      - key: ADAFRUIT_MQTT_PORT
        sync: false
      - key: GATEWAY_SECRET_TOKEN
        sync: false
      - key: DEBUG_MODE
        sync: false
